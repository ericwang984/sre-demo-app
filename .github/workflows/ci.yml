name: CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  # Gate 1: Code Quality
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --ignore=test_endpoints.py

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: github.event_name != 'pull_request'

  # Gate 2: Container Security
  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build image
        run: docker build -t demo-api:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo-api:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (tagged version)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag demo-api:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ env.VERSION }}
          docker tag demo-api:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ env.VERSION }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Push to GHCR (regular commit)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag demo-api:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag demo-api:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest

  # Gate 3: Update GitOps Repository
  update-gitops:
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ericwang984/sre-gitops-platform
          token: ${{ secrets.GITOPS_TOKEN }}
          persist-credentials: true

      - name: Verify GITOPS_TOKEN is set
        run: |
          if [ -z "${{ secrets.GITOPS_TOKEN }}" ]; then
            echo "ERROR: GITOPS_TOKEN secret is not set!"
            echo "Please create a PAT with 'repo' scope and add it as a secret named GITOPS_TOKEN"
            exit 1
          fi

      - name: Install yq for YAML editing
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update kustomization.yaml
        run: |
          KUSTOMIZE_FILE="apps/demo-app/overlays/dev/kustomization.yaml"

          # Check if the kustomization file exists
          if [ ! -f "$KUSTOMIZE_FILE" ]; then
            echo "Error: $KUSTOMIZE_FILE not found!"
            exit 1
          fi

          # Update the image tag
          yq eval ".images[0].newTag = \"${{ github.sha }}\"" -i "$KUSTOMIZE_FILE"

          echo "Updated $KUSTOMIZE_FILE with tag: ${{ github.sha }}"
          cat "$KUSTOMIZE_FILE"

      - name: Commit and push changes
        run: |
          git add apps/demo-app/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "Update demo-app image to ${{ github.sha }}"
          git push origin main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
